# ============================================
# FitTrack Pro - Complete Kubernetes Deployment
# Target Cluster: dev-ust-aks
# ============================================

# ---------- 1. NAMESPACE ----------
apiVersion: v1
kind: Namespace
metadata:
  name: fitness-app

---
# ---------- 2. CONFIGMAP (Non-sensitive env vars) ----------
apiVersion: v1
kind: ConfigMap
metadata:
  name: fitness-configmap
  namespace: fitness-app
data:
  MONGODB_URI: "mongodb://mongodb-service.fitness-app.svc.cluster.local:27017/fitness-tracker"
  PORT: "5000"
  HOST: "0.0.0.0"
  NODE_ENV: "production"
  DD_ENV: "production"
  DD_SERVICE: "fitness-tracker-app"
  DD_VERSION: "1.0.0"

---
# ---------- 3. SECRET (Sensitive data) ----------
apiVersion: v1
kind: Secret
metadata:
  name: fit-secret
  namespace: fitness-app
stringData:
  DD_TRACE_AGENT_PORT: "8126"

---
# ---------- 4. MONGODB STATEFULSET ----------
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: fitness-app
spec:
  serviceName: "mongodb-service"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7-jammy
        ports:
        - containerPort: 27017
        volumeMounts:
          - name: fit-volume
            mountPath: /data/db
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: fit-volume
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi

---
# ---------- 5. MONGODB SERVICE (Internal ClusterIP) ----------
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: fitness-app
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP

---
# ---------- 6. FITNESS APP DEPLOYMENT ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-tracker-app
  namespace: fitness-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: fitness-tracker-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: fitness-tracker-app
      annotations:
        ad.datadoghq.com/fitness-tracker-app.logs: >-
          [{"source":"nodejs","service":"fitness-tracker-service"},
           {"source":"nodejs","service":"fitness-tracker-app"}]
    spec:
      containers:
        - name: fitness-tracker-app
          image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: MONGODB_URI
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: PORT
            - name: HOST
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: HOST
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: NODE_ENV
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              valueFrom:
                secretKeyRef:
                  name: fit-secret
                  key: DD_TRACE_AGENT_PORT
            - name: DD_ENV
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: DD_ENV
            - name: DD_SERVICE
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: DD_SERVICE
            - name: DD_VERSION
              valueFrom:
                configMapKeyRef:
                  name: fitness-configmap
                  key: DD_VERSION

---
# ---------- 7. FITNESS APP SERVICE (LoadBalancer - External Access) ----------
apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
  namespace: fitness-app
spec:
  selector:
    app: fitness-tracker-app
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer
